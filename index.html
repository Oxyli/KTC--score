<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTC篮球联赛专用 🏀记分牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #3498db;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .header-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .tab-button {
            padding: 8px 16px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .tab-button:hover {
            background: #2980b9;
        }

        .premium-button {
            padding: 8px 16px;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .premium-button:hover {
            background: #d35400;
        }

        .content {
            position: relative;
            padding: 20px;
            min-height: calc(100vh - 160px);
            padding-left: 320px;
            padding-right: 320px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .left-players, .right-players {
            position: fixed;
            top: 100px;
            width: 280px;
            min-height: calc(100vh - 160px);
            max-height: calc(100vh - 160px);
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            z-index: 100;
        }

        .left-players {
            left: 20px;
        }

        .right-players {
            right: 20px;
        }

        #scoreboard-view {
            width: 100%;
            min-width: 500px;
        }

        .scoreboard {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .team-section {
            flex: 1;
            text-align: center;
        }

        .team-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .team-name:hover {
            background: #0f3460;
        }

        .team-name-input {
            font-size: 24px;
            font-weight: bold;
            background: #0f3460;
            border: 2px solid #3498db;
            border-radius: 5px;
            color: #fff;
            text-align: center;
            padding: 5px 10px;
            width: 100%;
            margin-bottom: 15px;
        }

        .score {
            font-size: 288px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
            line-height: 1;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-value.warning {
            color: #e74c3c;
        }

        .score-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .score-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .score-button:hover {
            transform: scale(1.1);
        }

        .score-button-3 {
            background: #e74c3c;
        }

        .score-button-2 {
            background: #3498db;
        }

        .score-button-1 {
            background: #2ecc71;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .action-button {
            padding: 8px 16px;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .action-button:hover {
            background: #34495e;
        }

        .center-section {
            text-align: center;
            margin: 0 20px;
        }

        .period {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #3498db;
        }

        .game-time {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .game-time.warning {
            color: #e74c3c;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-button {
            padding: 10px 20px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .control-button:hover {
            background: #2980b9;
        }

        .control-button.pause {
            background: #e74c3c;
        }

        .control-button.pause:hover {
            background: #c0392b;
        }

        .timeout-timer {
            margin-top: 10px;
            font-size: 14px;
            color: #e74c3c;
            font-weight: bold;
        }

        .timeout-timer.hidden {
            display: none;
        }

        .shot-clock-buttons {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .shot-clock-btn {
            flex: 1;
            padding: 4px 8px;
            font-size: 11px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .shot-clock-btn:hover {
            background: #2980b9;
        }

        .shot-clock-btn.active {
            background: #e74c3c;
        }

        .shot-clock-timer {
            margin-top: 5px;
            font-size: 16px;
            color: #e74c3c;
            font-weight: bold;
            text-align: center;
        }

        .shot-clock-timer.hidden {
            display: none;
        }

        .players-section {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .team-players {
            flex: 1;
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #888;
            margin-bottom: 15px;
            text-align: center;
        }

        .player-section {
            margin-bottom: 20px;
        }

        .player-section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .player-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .player-card:hover {
            background: #16213e;
        }

        .player-card.on-court {
            border-left-color: #2ecc71;
            background: #16213e;
        }

        .player-card.fouled-out {
            border-left-color: #e74c3c;
            background: #3d1f1f;
            opacity: 0.7;
        }

        .player-number {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
            min-width: 40px;
        }

        .player-name {
            flex: 1;
            font-size: 16px;
            margin: 0 10px;
        }

        .player-fouled-out-badge {
            background: #e74c3c;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .player-stats {
            display: flex;
            gap: 15px;
            margin-right: 10px;
        }

        .player-stat {
            text-align: center;
        }

        .player-stat-value {
            font-size: 14px;
            font-weight: bold;
        }

        .player-stat-value.foul-warning {
            color: #e74c3c;
        }

        .player-stat-label {
            font-size: 10px;
            color: #888;
        }

        .player-actions {
            display: flex;
            gap: 5px;
        }

        .player-action-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-foul {
            background: #e74c3c;
        }

        .btn-foul:hover {
            background: #c0392b;
        }

        .btn-sub {
            background: #3498db;
        }

        .btn-sub:hover {
            background: #2980b9;
        }

        .btn-edit {
            background: #f39c12;
        }

        .btn-edit:hover {
            background: #e67e22;
        }

        .btn-delete {
            background: #95a5a6;
        }

        .btn-delete:hover {
            background: #7f8c8d;
        }

        .add-player-btn {
            width: 100%;
            padding: 10px;
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .add-player-btn:hover {
            background: #27ae60;
        }

        .team-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .team-action-btn {
            flex: 1;
            padding: 8px;
            background: #34495e;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .team-action-btn:hover {
            background: #2c3e50;
        }

        .game-log-section {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .game-log-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #3498db;
        }

        #game-log-content {
            max-height: 300px;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .game-log-item {
            background: #0f3460;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .game-log-item .log-time {
            color: #3498db;
            font-weight: bold;
        }

        .game-log-item .log-period {
            color: #ffd700;
            margin-left: 10px;
        }

        .game-log-item .log-content {
            margin-top: 5px;
        }

        .game-log-item .log-score {
            color: #2ecc71;
            float: right;
            font-weight: bold;
        }

        .footer {
            background: #16213e;
            padding: 15px;
            text-align: center;
            border-top: 2px solid #3498db;
            font-size: 14px;
            color: #888;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #3498db;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f3460;
            border: 2px solid #3498db;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #2980b9;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .modal-btn-cancel {
            background: #95a5a6;
            color: #fff;
        }

        .modal-btn-cancel:hover {
            background: #7f8c8d;
        }

        .modal-btn-save {
            background: #3498db;
            color: #fff;
        }

        .modal-btn-save:hover {
            background: #2980b9;
        }

        .score-select-modal .modal-content {
            max-width: 500px;
        }

        #stats-modal .modal-content {
            max-width: 900px;
        }

        .player-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .score-select-player {
            background: #0f3460;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-select-player:hover {
            background: #16213e;
        }

        .score-select-player .player-number {
            font-size: 20px;
        }

        .score-select-player .player-name {
            flex: 1;
        }

        .score-select-player .player-points {
            color: #ffd700;
            font-weight: bold;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f3460;
            border-radius: 5px;
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
            min-width: 30px;
        }

        .feature-text {
            flex: 1;
        }

        .feature-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 14px;
            color: #888;
        }

        .pricing {
            margin: 20px 0;
        }

        .price {
            font-size: 32px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 5px;
        }

        .price-note {
            font-size: 14px;
            color: #888;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        .stats-table th, .stats-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #34495e;
        }

        .stats-table th {
            background: #0f3460;
            color: #3498db;
            font-weight: bold;
        }

        .stats-table tr:hover {
            background: #0f3460;
        }

        .hidden {
            display: none;
        }

        .active-timeout {
            background: #e74c3c !important;
        }

        .active-timeout:hover {
            background: #c0392b !important;
        }

        #saved-teams-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .saved-team-item {
            background: #0f3460;
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-team-name {
            font-weight: bold;
        }

        .saved-team-actions {
            display: flex;
            gap: 5px;
        }

        .saved-team-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .saved-team-btn.load {
            background: #3498db;
            color: #fff;
        }

        .saved-team-btn.delete {
            background: #e74c3c;
            color: #fff;
        }

        @media (max-width: 1200px) {
            .content {
                padding-left: 20px;
                padding-right: 20px;
            }
            
            .main-container {
                flex-direction: column;
                align-items: center;
            }
            
            .left-players, .right-players {
                position: static;
                flex: 1;
                width: 100%;
                max-width: 600px;
                min-height: 400px;
                max-height: none;
                margin-bottom: 20px;
            }
            
            #scoreboard-view {
                min-width: auto;
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .scoreboard {
                flex-direction: column;
                gap: 20px;
                padding: 15px;
            }
            
            .score {
                font-size: 80px;
            }
            
            .team-name {
                font-size: 18px;
            }
            
            .game-time {
                font-size: 36px;
            }
            
            .period {
                font-size: 18px;
            }
            
            .score-button {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }
            
            .main-container {
                gap: 10px;
            }
            
            .content {
                padding: 10px;
            }
            
            .left-players, .right-players {
                min-height: auto;
                max-height: 400px;
            }
            
            .title {
                font-size: 20px;
            }
            
            .header {
                padding: 15px;
            }
            
            .control-button {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .action-button {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 480px) {
            .score {
                font-size: 60px;
            }
            
            .game-time {
                font-size: 28px;
            }
            
            .score-button {
                width: 45px;
                height: 45px;
                font-size: 14px;
            }
            
            .stats-row {
                gap: 15px;
            }
            
            .stat-value {
                font-size: 20px;
            }
        }
        
        /* 手机横屏模式 - 显示为左右布局 */
        @media (max-width: 900px) and (orientation: landscape) {
            .content {
                padding: 5px;
                padding-left: 150px;
                padding-right: 150px;
            }
            
            .main-container {
                flex-direction: row;
                align-items: flex-start;
            }
            
            .left-players, .right-players {
                position: fixed;
                top: 50px;
                width: 140px;
                min-height: calc(100vh - 90px);
                max-height: calc(100vh - 90px);
                padding: 6px;
            }
            
            .left-players {
                left: 5px;
            }
            
            .right-players {
                right: 5px;
            }
            
            #scoreboard-view {
                min-width: auto;
                width: 100%;
            }
            
            .scoreboard {
                flex-direction: row;
                gap: 6px;
                padding: 8px;
            }
            
            .score {
                font-size: 48px;
                margin-bottom: 6px;
            }
            
            .team-name {
                font-size: 11px;
                margin-bottom: 6px;
            }
            
            .game-time {
                font-size: 18px;
                margin-bottom: 8px;
            }
            
            .period {
                font-size: 11px;
                margin-bottom: 4px;
            }
            
            .score-button {
                width: 32px;
                height: 32px;
                font-size: 11px;
            }
            
            .stats-row {
                gap: 12px;
                margin-bottom: 8px;
            }
            
            .stat-label {
                font-size: 9px;
            }
            
            .stat-value {
                font-size: 14px;
            }
            
            .title {
                font-size: 13px;
            }
            
            .header {
                padding: 6px;
            }
            
            .header-buttons {
                gap: 4px;
            }
            
            .tab-button, .premium-button {
                padding: 4px 8px;
                font-size: 10px;
            }
            
            .control-buttons {
                gap: 4px;
            }
            
            .control-button {
                padding: 4px 8px;
                font-size: 9px;
            }
            
            .shot-clock-btn {
                padding: 3px 6px;
                font-size: 9px;
            }
            
            .action-buttons {
                gap: 4px;
            }
            
            .action-button {
                padding: 3px 6px;
                font-size: 9px;
            }
            
            .section-title {
                font-size: 10px;
                margin-bottom: 5px;
            }
            
            .player-section {
                margin-bottom: 5px;
            }
            
            .player-section-title {
                font-size: 9px;
                margin-bottom: 3px;
            }
            
            .player-card {
                padding: 4px;
                margin-bottom: 4px;
                flex-wrap: nowrap;
            }
            
            .player-number {
                font-size: 13px;
                min-width: 22px;
            }
            
            .player-name {
                font-size: 10px;
                margin: 0 4px;
                flex: 1;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            
            .player-stats {
                gap: 6px;
                margin-right: 4px;
            }
            
            .player-stat-value {
                font-size: 10px;
            }
            
            .player-stat-label {
                font-size: 8px;
            }
            
            .player-actions {
                gap: 2px;
                width: auto;
                justify-content: flex-start;
                margin-top: 0;
                flex-shrink: 0;
            }
            
            .player-action-btn {
                width: 20px;
                height: 20px;
                font-size: 9px;
                border-radius: 3px;
            }
            
            .player-fouled-out-badge {
                font-size: 8px;
                padding: 1px 3px;
            }
            
            .add-player-btn {
                padding: 5px;
                font-size: 10px;
                margin-top: 5px;
            }
            
            .team-actions {
                gap: 4px;
                margin-top: 5px;
            }
            
            .team-action-btn {

    <script>
        const REGULAR_PERIOD_TIME = 10 * 60;
        const OVERTIME_TIME = 5 * 60;
        const TIMEOUT_DURATION = 60;

        let gameState = {
            homeTeam: {
                name: '主队',
                score: 0,
                fouls: 0,
                timeouts: 2,
                players: []
            },
            awayTeam: {
                name: '客队',
                score: 0,
                fouls: 0,
                timeouts: 2,
                players: []
            },
            gameTime: REGULAR_PERIOD_TIME,
            period: 1,
            isRunning: false,
            isProVersion: false,
            gameLog: [],
            gameStartTime: null,
            isGameEnded: false,
            isOvertime: false,
            timeoutTimers: {
                home: TIMEOUT_DURATION,
                homeRunning: false,
                away: TIMEOUT_DURATION,
                awayRunning: false
            },
            shotClock: {
                home: 0,
                homeRunning: false,
                away: 0,
                awayRunning: false
            },
            actionHistory: []
        };

        let timerInterval = null;
        let timeoutInterval = null;
        let shotClockInterval = null;
        let editingPlayer = null;
        let editingTeam = null;
        let currentTeamToSave = null;
        let pendingScore = null;

        // 声音提示函数
        let audioContext = null;
        
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // 确保音频上下文处于活动状态
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function playSound(type = 'default') {
            try {
                initAudioContext();
                
                // 创建一个振荡器
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // 根据类型设置不同的声音参数
                if (type === 'shot-clock') {
                    // NBA风格的进攻时间到轰鸣声
                    oscillator.type = 'sawtooth'; // 锯齿波，更有冲击力
                    oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 1.5);
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
                    
                    // 播放声音
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 1.5);
                } else {
                    // 默认声音
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 1.0);
                    
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.0);
                    
                    // 播放声音
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 1.0);
                }
            } catch (error) {
                console.log('无法播放声音:', error);
            }
        }

        function init() {
            loadSettings();
            updateDisplay();
            if (gameState.isProVersion) {
                updateProUI();
                renderPlayers();
                renderGameLog();
            }
            
            // 添加用户交互事件监听器，确保音频上下文被激活
            document.addEventListener('click', initAudioContext, { once: true });
            document.addEventListener('touchstart', initAudioContext, { once: true });
        }

        function saveSettings() {
            localStorage.setItem('fibaGameState', JSON.stringify(gameState));
        }

        function loadSettings() {
            const saved = localStorage.getItem('fibaGameState');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function updateDisplay() {
            document.getElementById('home-team-name').textContent = gameState.homeTeam.name;
            document.getElementById('home-score').textContent = gameState.homeTeam.score;
            
            const homeFoulsEl = document.getElementById('home-fouls');
            homeFoulsEl.textContent = gameState.homeTeam.fouls;
            if (gameState.homeTeam.fouls >= 5) {
                homeFoulsEl.classList.add('warning');
            } else {
                homeFoulsEl.classList.remove('warning');
            }
            
            document.getElementById('home-timeouts').textContent = gameState.homeTeam.timeouts;
            
            document.getElementById('away-team-name').textContent = gameState.awayTeam.name;
            document.getElementById('away-score').textContent = gameState.awayTeam.score;
            
            const awayFoulsEl = document.getElementById('away-fouls');
            awayFoulsEl.textContent = gameState.awayTeam.fouls;
            if (gameState.awayTeam.fouls >= 5) {
                awayFoulsEl.classList.add('warning');
            } else {
                awayFoulsEl.classList.remove('warning');
            }
            
            document.getElementById('away-timeouts').textContent = gameState.awayTeam.timeouts;
            
            const periodDisplay = document.getElementById('period-display');
            periodDisplay.textContent = getPeriodDisplay(gameState.period, gameState.isOvertime);
            
            const timeElement = document.getElementById('game-time');
            timeElement.textContent = formatTime(gameState.gameTime);
            
            if (gameState.gameTime <= 30) {
                timeElement.classList.add('warning');
            } else {
                timeElement.classList.remove('warning');
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function getPeriodDisplay(period, isOvertime) {
            if (isOvertime) {
                return `加时${period}`;
            }
            return `第 ${period} 节`;
        }

        function addScore(team, points) {
            // 保存操作前的状态
            const beforeState = JSON.parse(JSON.stringify({
                homeTeam: gameState.homeTeam,
                awayTeam: gameState.awayTeam,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            }));
            
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            teamData.score += points;
            saveSettings();
            updateDisplay();
            
            // 生成事件对象
            const event = {
                type: 'score',
                team: team,
                points: points,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            };
            
            // 添加到游戏记录并保存历史
            addGameLog(event, beforeState);
        }

        function showScorePlayerSelect(team, points) {
            if (!gameState.isProVersion) {
                addScore(team, points);
                return;
            }
            
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const onCourtPlayers = teamData.players.filter(p => p.isOnCourt && p.fouls < 5);
            
            if (onCourtPlayers.length === 0) {
                alert('场上没有可上场的球员，请先添加球员并进行换人');
                return;
            }
            
            pendingScore = { team, points };
            
            const listEl = document.getElementById('score-player-list');
            let html = '';
            
            onCourtPlayers.forEach(player => {
                html += `
                    <div class="score-select-player" onclick="confirmPlayerScore('${player.id}')">
                        <div class="player-number">${player.number}</div>
                        <div class="player-name">${player.name}</div>
                        <div class="player-points">${player.points}分</div>
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
            document.getElementById('score-select-modal').classList.add('active');
        }

        function confirmPlayerScore(playerId) {
            if (!pendingScore) return;
            
            // 保存操作前的状态
            const beforeState = JSON.parse(JSON.stringify({
                homeTeam: gameState.homeTeam,
                awayTeam: gameState.awayTeam,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            }));
            
            const { team, points } = pendingScore;
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const player = teamData.players.find(p => p.id === playerId);
            
            if (player) {
                player.points += points;
                teamData.score += points;
                
                // 生成事件对象
                const event = {
                    type: 'score',
                    team: team,
                    playerId: playerId,
                    playerName: player.name,
                    playerNumber: player.number,
                    points: points,
                    gameTime: gameState.gameTime,
                    period: gameState.period,
                    isOvertime: gameState.isOvertime
                };
                
                // 添加到游戏记录并保存历史
                addGameLog(event, beforeState);
                
                saveSettings();
                updateDisplay();
                if (gameState.isProVersion) {
                    renderPlayers();
                    renderGameLog();
                }
            }
            
            closeScoreSelectModal();
        }

        function closeScoreSelectModal() {
            document.getElementById('score-select-modal').classList.remove('active');
            pendingScore = null;
        }

        function addFoul(team) {
            // 保存操作前的状态
            const beforeState = JSON.parse(JSON.stringify({
                homeTeam: gameState.homeTeam,
                awayTeam: gameState.awayTeam,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            }));
            
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            teamData.fouls++;
            saveSettings();
            updateDisplay();
            
            // 生成事件对象
            const event = {
                type: 'foul',
                team: team,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            };
            
            // 添加到游戏记录并保存历史
            addGameLog(event, beforeState);
            
            if (gameState.isProVersion) {
                renderGameLog();
            }
        }

        function useTimeout(team) {
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const isRunning = team === 'home' ? gameState.timeoutTimers.homeRunning : gameState.timeoutTimers.awayRunning;
            
            if (isRunning) {
                stopTimeoutTimer(team);
            } else if (teamData.timeouts > 0) {
                teamData.timeouts--;
                startTimeoutTimer(team);
                
                addGameLog({
                    type: 'timeout',
                    team: team,
                    gameTime: gameState.gameTime,
                    period: gameState.period,
                    isOvertime: gameState.isOvertime
                });
                
                updateDisplay();
                if (gameState.isProVersion) {
                    renderGameLog();
                }
            }
        }

        function startTimeoutTimer(team) {
            const timerKey = team === 'home' ? 'home' : 'away';
            const timerEl = document.getElementById(`${team}-timeout-timer`);
            const btnEl = document.getElementById(`${team}-timeout-btn`);
            
            gameState.timeoutTimers[timerKey] = TIMEOUT_DURATION;
            gameState.timeoutTimers[`${timerKey}Running`] = true;
            
            timerEl.classList.remove('hidden');
            btnEl.classList.add('active-timeout');
            btnEl.textContent = '停止';
            
            updateTimeoutDisplay(team);
            
            if (timeoutInterval) {
                clearInterval(timeoutInterval);
            }
            
            timeoutInterval = setInterval(() => {
                gameState.timeoutTimers[timerKey]--;
                updateTimeoutDisplay(team);
                
                if (gameState.timeoutTimers[timerKey] <= 0) {
                    stopTimeoutTimer(team);
                    playSound(); // 暂停时间结束声音提示
                    // 使用setTimeout延迟alert，确保声音有足够时间播放（1秒）
                    setTimeout(() => {
                        alert(`${team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name} 暂停时间到！`);
                    }, 1000);
                }
            }, 1000);
            
            if (gameState.isRunning) {
                gameState.isRunning = false;
                const gameBtn = document.getElementById('start-pause-btn');
                gameBtn.textContent = '开始';
                gameBtn.classList.remove('pause');
                clearInterval(timerInterval);
            }
        }

        function stopTimeoutTimer(team) {
            const timerKey = team === 'home' ? 'home' : 'away';
            const timerEl = document.getElementById(`${team}-timeout-timer`);
            const btnEl = document.getElementById(`${team}-timeout-btn`);
            
            gameState.timeoutTimers[`${timerKey}Running`] = false;
            
            timerEl.classList.add('hidden');
            btnEl.classList.remove('active-timeout');
            btnEl.textContent = '暂停';
            
            clearInterval(timeoutInterval);
        }

        function updateTimeoutDisplay(team) {
            const timerKey = team === 'home' ? 'home' : 'away';
            const timerEl = document.getElementById(`${team}-timeout-timer`);
            const seconds = gameState.timeoutTimers[timerKey];
            timerEl.textContent = `暂停倒计时: ${seconds}秒`;
        }

        function startShotClock(team, seconds) {
            const timerKey = team === 'home' ? 'home' : 'away';
            const timerEl = document.getElementById(`${team}-shot-clock-timer`);
            const btn24 = document.getElementById(`${team}-shot-24`);
            const btn14 = document.getElementById(`${team}-shot-14`);
            
            if (!timerEl || !btn24 || !btn14) return;
            
            // 停止另一个球队的进攻时间
            const otherTeam = team === 'home' ? 'away' : 'home';
            stopShotClock(otherTeam);
            
            // 停止当前球队的进攻时间（如果正在运行）
            if (gameState.shotClock[`${timerKey}Running`]) {
                stopShotClock(team);
            }
            
            gameState.shotClock[timerKey] = seconds;
            gameState.shotClock[`${timerKey}Running`] = true;
            
            timerEl.classList.remove('hidden');
            timerEl.textContent = `${seconds}秒`;
            
            // 更新按钮状态
            btn24.classList.remove('active');
            btn14.classList.remove('active');
            if (seconds === 24) {
                btn24.classList.add('active');
            } else {
                btn14.classList.add('active');
            }
            
            shotClockInterval = setInterval(() => {
                if (gameState.shotClock[timerKey] > 0) {
                    gameState.shotClock[timerKey]--;
                    timerEl.textContent = `${gameState.shotClock[timerKey]}秒`;
                } else {
                    stopShotClock(team);
                    playSound('shot-clock'); // 进攻时间结束声音提示（NBA风格轰鸣声）
                    // 使用setTimeout延迟alert，确保声音有足够时间播放（1.5秒）
                    setTimeout(() => {
                        alert('进攻时间到！');
                    }, 1500);
                }
            }, 1000);
        }

        function stopShotClock(team) {
            const timerKey = team === 'home' ? 'home' : 'away';
            const timerEl = document.getElementById(`${team}-shot-clock-timer`);
            const btn24 = document.getElementById(`${team}-shot-24`);
            const btn14 = document.getElementById(`${team}-shot-14`);
            
            if (!timerEl || !btn24 || !btn14) return;
            
            gameState.shotClock[`${timerKey}Running`] = false;
            
            timerEl.classList.add('hidden');
            btn24.classList.remove('active');
            btn14.classList.remove('active');
            
            clearInterval(shotClockInterval);
        }

        function toggleGame() {
            const btn = document.getElementById('start-pause-btn');
            if (gameState.isRunning) {
                gameState.isRunning = false;
                btn.textContent = '开始';
                btn.classList.remove('pause');
                clearInterval(timerInterval);
                
                addGameLog({
                    type: 'officialTimeout',
                    gameTime: gameState.gameTime,
                    period: gameState.period,
                    isOvertime: gameState.isOvertime
                });
                if (gameState.isProVersion) {
                    renderGameLog();
                }
            } else {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                gameState.isRunning = true;
                btn.textContent = '暂停';
                btn.classList.add('pause');
                
                if (!gameState.gameStartTime) {
                    gameState.gameStartTime = new Date().toISOString();
                    saveSettings();
                }
                
                timerInterval = setInterval(() => {
                    if (gameState.gameTime > 0) {
                        gameState.gameTime--;
                        updateDisplay();
                    } else {
                        gameState.isRunning = false;
                        btn.textContent = '开始';
                        btn.classList.remove('pause');
                        clearInterval(timerInterval);
                        playSound(); // 比赛时间结束声音提示
                        // 使用setTimeout延迟alert，确保声音有足够时间播放（1秒）
                        setTimeout(() => {
                            alert('比赛时间结束！');
                        }, 1000);
                    }
                }, 1000);
            }
        }

        function resetGame() {
            if (!confirm('确定要重置比赛吗？所有数据将被清空。')) {
                return;
            }
            
            // 先停止所有计时器
            stopTimeoutTimer('home');
            stopTimeoutTimer('away');
            stopShotClock('home');
            stopShotClock('away');
            clearInterval(timerInterval);
            
            // 然后重置状态
            gameState.homeTeam.score = 0;
            gameState.homeTeam.fouls = 0;
            gameState.homeTeam.timeouts = 2;
            gameState.awayTeam.score = 0;
            gameState.awayTeam.fouls = 0;
            gameState.awayTeam.timeouts = 2;
            gameState.gameTime = REGULAR_PERIOD_TIME;
            gameState.period = 1;
            gameState.isRunning = false;
            gameState.gameLog = [];
            gameState.gameStartTime = null;
            gameState.isGameEnded = false;
            gameState.isOvertime = false;
            gameState.actionHistory = [];
            
            gameState.homeTeam.players.forEach(p => {
                p.points = 0;
                p.fouls = 0;
                p.isOnCourt = false;
            });
            
            gameState.awayTeam.players.forEach(p => {
                p.points = 0;
                p.fouls = 0;
                p.isOnCourt = false;
            });
            
            const btn = document.getElementById('start-pause-btn');
            btn.textContent = '开始';
            btn.classList.remove('pause');
            
            saveSettings();
            updateDisplay();
            if (gameState.isProVersion) {
                renderPlayers();
                renderGameLog();
            }
        }

        function nextPeriod() {
            if (gameState.period === 4 && !gameState.isOvertime) {
                if (gameState.homeTeam.score === gameState.awayTeam.score) {
                    gameState.isOvertime = true;
                    gameState.period = 1;
                    gameState.gameTime = OVERTIME_TIME;
                } else {
                    alert('比赛已结束！');
                    return;
                }
            } else if (gameState.isOvertime) {
                if (gameState.homeTeam.score === gameState.awayTeam.score) {
                    gameState.period++;
                    gameState.gameTime = OVERTIME_TIME;
                } else {
                    alert('比赛已结束！');
                    return;
                }
            } else {
                gameState.period++;
                gameState.gameTime = REGULAR_PERIOD_TIME;
            }
            
            gameState.homeTeam.fouls = 0;
            gameState.awayTeam.fouls = 0;
            
            if (gameState.isOvertime) {
                gameState.homeTeam.timeouts = 1;
                gameState.awayTeam.timeouts = 1;
            } else {
                gameState.homeTeam.timeouts = 2;
                gameState.awayTeam.timeouts = 2;
            }
            
            gameState.isRunning = false;
            stopTimeoutTimer('home');
            stopTimeoutTimer('away');
            stopShotClock('home');
            stopShotClock('away');
            clearInterval(timerInterval);
            
            addGameLog({
                type: 'period',
                period: gameState.period,
                isOvertime: gameState.isOvertime,
                gameTime: 0
            });
            
            const btn = document.getElementById('start-pause-btn');
            btn.textContent = '开始';
            btn.classList.remove('pause');
            
            saveSettings();
            updateDisplay();
            if (gameState.isProVersion) {
                renderPlayers();
                renderGameLog();
            }
        }

        function endGame() {
            if (!confirm('确定要结束比赛吗？')) {
                return;
            }
            
            gameState.isGameEnded = true;
            gameState.isRunning = false;
            clearInterval(timerInterval);
            
            addGameLog({
                type: 'end',
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            });
            
            const btn = document.getElementById('start-pause-btn');
            btn.textContent = '开始';
            btn.classList.remove('pause');
            
            saveSettings();
            updateDisplay();
            if (gameState.isProVersion) {
                showStatsModal();
                renderGameLog();
            }
        }

        function editTeamName(team) {
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const currentName = teamData.name;
            const newName = prompt('请输入球队名称:', currentName);
            if (newName && newName.trim()) {
                teamData.name = newName.trim();
                saveSettings();
                updateDisplay();
                if (gameState.isProVersion) {
                    renderPlayers();
                }
            }

        function showPlayerModal(team) {
            editingPlayer = null;
            editingTeam = team;
            document.getElementById('player-modal-title').textContent = '添加球员';
            document.getElementById('player-number').value = '';
            document.getElementById('player-name').value = '';
            document.getElementById('player-modal').classList.add('active');
        }

        function closePlayerModal() {
            document.getElementById('player-modal').classList.remove('active');
            editingPlayer = null;
            editingTeam = null;
        }

        function savePlayer() {
            const number = document.getElementById('player-number').value.trim();
            const name = document.getElementById('player-name').value.trim();
            
            if (!number || !name) {
                alert('请输入球员号码和姓名');
                return;
            }
            
            if (isNaN(number) || number < 1 || number > 99) {
                alert('请输入有效的球员号码 (1-99)');
                return;
            }
            
            const teamData = editingTeam === 'home' ? gameState.homeTeam : gameState.awayTeam;
            
            if (editingPlayer) {
                editingPlayer.number = number;
                editingPlayer.name = name;
            } else {
                if (teamData.players.some(p => p.number === number)) {
                    alert('该号码已存在');
                    return;
                }
                
                teamData.players.push({
                    id: Date.now().toString(),
                    number: number,
                    name: name,
                    points: 0,
                    fouls: 0,
                    isOnCourt: false
                });
            }
            
            saveSettings();
            closePlayerModal();
            renderPlayers();
        }

        function editPlayer(team, playerId) {
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const player = teamData.players.find(p => p.id === playerId);
            if (player) {
                editingPlayer = player;
                editingTeam = team;
                document.getElementById('player-modal-title').textContent = '编辑球员';
                document.getElementById('player-number').value = player.number;
                document.getElementById('player-name').value = player.name;
                document.getElementById('player-modal').classList.add('active');
            }
        }

        function deletePlayer(team, playerId) {
            if (!confirm('确定要删除该球员吗？')) {
                return;
            }
            
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            teamData.players = teamData.players.filter(p => p.id !== playerId);
            saveSettings();
            renderPlayers();
        }

        function substitutePlayer(team, playerId) {
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const player = teamData.players.find(p => p.id === playerId);
            const onCourtCount = teamData.players.filter(p => p.isOnCourt && p.fouls < 5).length;
            
            if (player) {
                if (player.fouls >= 5) {
                    alert('该球员已犯满离场，不能上场');
                    return;
                }
                
                if (player.isOnCourt && onCourtCount <= 1) {
                    alert('场上至少需要1名球员');
                    return;
                }
                if (!player.isOnCourt && onCourtCount >= 5) {
                    alert('场上最多只能有5名球员');
                    return;
                }
                player.isOnCourt = !player.isOnCourt;
                
                addGameLog({
                    type: 'substitution',
                    team: team,
                    playerName: player.name,
                    playerNumber: player.number,
                    isOnCourt: player.isOnCourt,
                    gameTime: gameState.gameTime,
                    period: gameState.period,
                    isOvertime: gameState.isOvertime
                });
                
                saveSettings();
                renderPlayers();
                renderGameLog();
            }
        }

        function addPlayerFoul(team, playerId) {
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            const player = teamData.players.find(p => p.id === playerId);
            if (player && player.fouls < 5) {
                player.fouls++;
                teamData.fouls++;
                
                addGameLog({
                    type: 'playerFoul',
                    team: team,
                    playerName: player.name,
                    playerNumber: player.number,
                    gameTime: gameState.gameTime,
                    period: gameState.period,
                    isOvertime: gameState.isOvertime
                });
                
                if (player.fouls >= 5) {
                    player.isOnCourt = false;
                    addGameLog({
                        type: 'fouledOut',
                        team: team,
                        playerName: player.name,
                        playerNumber: player.number,
                        gameTime: gameState.gameTime,
                        period: gameState.period,
                        isOvertime: gameState.isOvertime
                    });
                    alert(`球员 #${player.number} ${player.name} 已犯满5次，被罚下场！`);
                }
                
                saveSettings();
                renderPlayers();
                updateDisplay();
                renderGameLog();
            } else if (player && player.fouls >= 5) {
                alert('该球员已犯规满5次，不能继续比赛');
            }
        }

        function renderTeamPlayers(team) {
            const container = document.getElementById(`${team}-players`);
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            
            let html = `<div class="section-title">${teamData.name}</div>`;
            
            const onCourt = teamData.players.filter(p => p.isOnCourt && p.fouls < 5);
            const bench = teamData.players.filter(p => !p.isOnCourt && p.fouls < 5);
            const fouledOut = teamData.players.filter(p => p.fouls >= 5);
            
            html += `<div class="player-section">
                <div class="player-section-title">在场球员 (${onCourt.length}/5)</div>`;
            
            onCourt.forEach(player => {
                html += renderPlayerCard(team, player, true);
            });
            
            html += `</div>`;
            
            if (fouledOut.length > 0) {
                html += `<div class="player-section">
                    <div class="player-section-title" style="color: #e74c3c;">犯满离场 (${fouledOut.length})</div>`;
                fouledOut.forEach(player => {
                    html += renderPlayerCard(team, player, false, true);
                });
                html += `</div>`;
            }
            
            html += `<div class="player-section">
                <div class="player-section-title">替补球员 (${bench.length})</div>`;
            
            bench.forEach(player => {
                html += renderPlayerCard(team, player, false);
            });
            
            html += `</div><button class="add-player-btn" onclick="showPlayerModal('${team}')">+ 添加球员</button>`;
            
            html += `
                <div class="team-actions">
                    <button class="team-action-btn" onclick="saveTeamToList('${team}')">保存球队</button>
                    <button class="team-action-btn" onclick="showSavedTeamsModal('${team}')">加载球队</button>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function renderPlayerCard(team, player, isOnCourt, isFouledOut = false) {
            const foulClass = player.fouls >= 5 ? 'foul-warning' : '';
            const fouledOutBadge = player.fouls >= 5 ? '<span class="player-fouled-out-badge">犯满离场</span>' : '';
            const cardClass = isFouledOut ? 'fouled-out' : (isOnCourt ? 'on-court' : '');
            
            return `
                <div class="player-card ${cardClass}">
                    <div class="player-number">${player.number}</div>
                    <div class="player-name">${player.name}${fouledOutBadge}</div>
                    <div class="player-stats">
                        <div class="player-stat">
                            <div class="player-stat-value">${player.points}</div>
                            <div class="player-stat-label">得分</div>
                        </div>
                        <div class="player-stat">
                            <div class="player-stat-value ${foulClass}">${player.fouls}</div>
                            <div class="player-stat-label">犯规</div>
                        </div>
                    </div>
                    <div class="player-actions">
                        ${isOnCourt && player.fouls < 5 ? `
                            <button class="player-action-btn btn-foul" onclick="addPlayerFoul('${team}', '${player.id}')">犯</button>
                        ` : ''}
                        ${player.fouls < 5 ? `
                            <button class="player-action-btn btn-sub" onclick="substitutePlayer('${team}', '${player.id}')">${isOnCourt ? '下' : '上'}</button>
                        ` : ''}
                        <button class="player-action-btn btn-edit" onclick="editPlayer('${team}', '${player.id}')">编</button>
                        <button class="player-action-btn btn-delete" onclick="deletePlayer('${team}', '${player.id}')">删</button>
                    </div>
                </div>
            `;
        }

        function addGameLog(event, beforeState) {
            event.timestamp = new Date().toISOString();
            gameState.gameLog.unshift(event);
            
            // 保存到历史记录用于回退（最多保存2条）
            if (event.type !== 'officialTimeout' && event.type !== 'undo') {
                const historyItem = {
                    type: event.type,
                    data: JSON.parse(JSON.stringify(event)),
                    gameStateSnapshot: beforeState || JSON.parse(JSON.stringify({
                        homeTeam: gameState.homeTeam,
                        awayTeam: gameState.awayTeam,
                        gameTime: gameState.gameTime,
                        period: gameState.period,
                        isOvertime: gameState.isOvertime
                    }))
                };
                gameState.actionHistory.push(historyItem);
                if (gameState.actionHistory.length > 2) {
                    gameState.actionHistory.shift();
                }
            }
            
            saveSettings();
        }

        function undoLastAction() {
            if (gameState.actionHistory.length === 0) {
                alert('没有可以回退的操作');
                return;
            }
            
            const lastAction = gameState.actionHistory.pop();
            const snapshot = lastAction.gameStateSnapshot;
            
            let undoDescription = '';
            
            // 根据操作类型生成描述（使用快照中的球队名称）
            if (lastAction.type === 'score') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}得分`;
            } else if (lastAction.type === 'foul') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}犯规`;
            } else if (lastAction.type === 'timeout') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}暂停`;
            } else if (lastAction.type === 'substitution') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}换人`;
            } else if (lastAction.type === 'playerFoul') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}球员犯规`;
            } else if (lastAction.type === 'fouledOut') {
                const teamName = lastAction.data.team === 'home' ? snapshot.homeTeam.name : snapshot.awayTeam.name;
                undoDescription = `取消${teamName}球员犯满离场`;
            } else {
                undoDescription = '官方调整';
            }
            
            // 恢复状态
            gameState.homeTeam = snapshot.homeTeam;
            gameState.awayTeam = snapshot.awayTeam;
            gameState.gameTime = snapshot.gameTime;
            gameState.period = snapshot.period;
            gameState.isOvertime = snapshot.isOvertime;
            
            // 添加回退记录
            addGameLog({
                type: 'undo',
                description: undoDescription,
                gameTime: gameState.gameTime,
                period: gameState.period,
                isOvertime: gameState.isOvertime
            });
            
            updateDisplay();
            if (gameState.isProVersion) {
                renderPlayers();
                renderGameLog();
            }
        }

        function renderGameLog() {
            if (!gameState.isProVersion) return;
            
            const container = document.getElementById('game-log-content');
            let html = '';
            
            // 反转数组，让最新的记录显示在下方
            const reversedLogs = [...gameState.gameLog].reverse();
            
            reversedLogs.forEach(log => {
                const timeStr = formatTime(log.gameTime);
                const periodStr = getPeriodDisplay(log.period, log.isOvertime);
                let content = '';
                let score = '';
                
                if (log.type === 'score') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    if (log.playerName) {
                        content = `${teamName} #${log.playerNumber} ${log.playerName} 投进${log.points}分`;
                    } else {
                        content = `${teamName} 投进${log.points}分`;
                    }
                    score = `${gameState.homeTeam.score} - ${gameState.awayTeam.score}`;
                } else if (log.type === 'foul') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    content = `${teamName} 犯规`;
                } else if (log.type === 'timeout') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    content = `${teamName} 请求暂停`;
                } else if (log.type === 'substitution') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    content = `${teamName} #${log.playerNumber} ${log.playerName} ${log.isOnCourt ? '上场' : '下场'}`;
                } else if (log.type === 'period') {
                    content = `开始${getPeriodDisplay(log.period, log.isOvertime)}`;
                } else if (log.type === 'end') {
                    content = '比赛结束';
                    score = `${gameState.homeTeam.score} - ${gameState.awayTeam.score}`;
                } else if (log.type === 'officialTimeout') {
                    content = '官方暂停时间';
                } else if (log.type === 'fouledOut') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    content = `${teamName} #${log.playerNumber} ${log.playerName} 犯满离场`;
                } else if (log.type === 'playerFoul') {
                    const teamName = log.team === 'home' ? gameState.homeTeam.name : gameState.awayTeam.name;
                    content = `${teamName} #${log.playerNumber} ${log.playerName} 犯规`;
                } else if (log.type === 'undo') {
                    content = log.description;
                }
                
                html += `
                    <div class="game-log-item">
                        <span class="log-time">${timeStr}</span>
                        <span class="log-period">${periodStr}</span>
                        ${score ? `<span class="log-score">${score}</span>` : ''}
                        <div class="log-content">${content}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // 自动滚动到底部显示最新记录
            container.scrollTop = container.scrollHeight;
        }

        function generateTeamStatsTable(teamData) {
            let html = `
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>号码</th>
                            <th>姓名</th>
                            <th>得分</th>
                            <th>投篮</th>

                            <th>犯规</th>
                            <th>上场</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            const sortedPlayers = [...teamData.players].sort((a, b) => b.points - a.points);
            
            sortedPlayers.forEach(player => {
                const foulClass = player.fouls >= 5 ? 'style="color: #e74c3c;"' : '';
                const status = player.fouls >= 5 ? '犯满' : (player.isOnCourt ? '在场' : '替补');
                
                html += `
                    <tr>
                        <td>${player.number}</td>
                        <td>${player.name}</td>
                        <td>${player.points}</td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                        <td ${foulClass}>${player.fouls}</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            return html;
        }

        function closeStatsModal() {
            document.getElementById('stats-modal').classList.remove('active');
        }

        function exportToCSV() {
            let csv = '比赛统计\n\n';
            csv += `${gameState.homeTeam.name} vs ${gameState.awayTeam.name}\n`;
            csv += `最终比分: ${gameState.homeTeam.score} - ${gameState.awayTeam.score}\n`;
            csv += `比赛时间: ${gameState.gameStartTime ? new Date(gameState.gameStartTime).toLocaleString() : '未记录'}\n\n`;
            
            [gameState.homeTeam, gameState.awayTeam].forEach(team => {
                csv += `${team.name}\n`;
                csv += '号码,姓名,得分,犯规,状态\n';
                team.players.forEach(player => {
                    const status = player.fouls >= 5 ? '犯满' : (player.isOnCourt ? '在场' : '替补');
                    csv += `${player.number},${player.name},${player.points},${player.fouls},${status}\n`;
                });
                csv += '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `比赛统计_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }

        function exportToJSON() {
            const data = {
                gameInfo: {
                    homeTeam: gameState.homeTeam.name,
                    awayTeam: gameState.awayTeam.name,
                    homeScore: gameState.homeTeam.score,
                    awayScore: gameState.awayTeam.score,
                    gameStartTime: gameState.gameStartTime,
                    gameEndTime: new Date().toISOString()
                },
                homeTeam: {
                    name: gameState.homeTeam.name,
                    score: gameState.homeTeam.score,
                    players: gameState.homeTeam.players
                },
                awayTeam: {
                    name: gameState.awayTeam.name,
                    score: gameState.awayTeam.score,
                    players: gameState.awayTeam.players
                },
                gameLog: gameState.gameLog
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `比赛数据_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
        }

        function saveTeamToList(team) {
            currentTeamToSave = team;
            const teamData = team === 'home' ? gameState.homeTeam : gameState.awayTeam;
            
            if (teamData.players.length === 0) {
                alert('当前没有球员可保存');
                return;
            }
            
            const teamName = prompt('请输入球队名称:', teamData.name);
            if (teamName && teamName.trim()) {
                const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '[]');
                const existingIndex = savedTeams.findIndex(t => t.name === teamName.trim());
                
                const teamToSave = {
                    name: teamName.trim(),
                    players: teamData.players.map(p => ({
                        number: p.number,
                        name: p.name
                    }))
                };
                
                if (existingIndex >= 0) {
                    savedTeams[existingIndex] = teamToSave;
                } else {
                    savedTeams.push(teamToSave);
                }
                
                localStorage.setItem('savedTeams', JSON.stringify(savedTeams));
                alert('球队已保存！');
            }
        }

        function showSavedTeamsModal(team) {
            currentTeamToSave = team;
            const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '[]');
            const listEl = document.getElementById('saved-teams-list');
            
            if (savedTeams.length === 0) {
                listEl.innerHTML = '<p style="color: #888;">暂无保存的球队</p>';
            } else {
                let html = '';
                savedTeams.forEach((team, index) => {
                    html += `
                        <div class="saved-team-item">
                            <div class="saved-team-name">${team.name} (${team.players.length}人)</div>
                            <div class="saved-team-actions">
                                <button class="saved-team-btn load" onclick="loadSavedTeam(${index})">加载</button>
                                <button class="saved-team-btn delete" onclick="deleteSavedTeam(${index})">删除</button>
                            </div>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            }
            
            document.getElementById('saved-teams-modal').classList.add('active');
        }

        function closeSavedTeamsModal() {
            document.getElementById('saved-teams-modal').classList.remove('active');
            currentTeamToSave = null;
        }

        function loadSavedTeam(index) {
            const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '[]');
            const savedTeam = savedTeams[index];
            
            if (savedTeam && currentTeamToSave) {
                const teamData = currentTeamToSave === 'home' ? gameState.homeTeam : gameState.awayTeam;
                teamData.name = savedTeam.name;
                teamData.players = savedTeam.players.map(p => ({
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                    number: p.number,
                    name: p.name,
                    points: 0,
                    fouls: 0,
                    isOnCourt: false
                }));
                
                saveSettings();
                updateDisplay();
                renderPlayers();
                closeSavedTeamsModal();
                alert('球队已加载！');
            }
        }

        function deleteSavedTeam(index) {
            if (!confirm('确定要删除这个球队吗？')) {
                return;
            }
            
            const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '[]');
            savedTeams.splice(index, 1);
            localStorage.setItem('savedTeams', JSON.stringify(savedTeams));
            showSavedTeamsModal(currentTeamToSave);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
